<!DOCTYPE html>
<html lang="es">
<head>
    <!-- Mismos metadatos y enlaces que en index.html -->
    <title>Panel de Administración - La Tamalería Cancún</title>
    <!-- Repite los mismos enlaces a CSS y scripts del index -->
</head>
<body>

    <header>
        <div class="logo">
            <h1>Panel de Administración</h1>
        </div>
        <nav>
            <a href="index.html">Volver al Sitio</a>
        </nav>
    </header>

    <main class="admin-container">
        <!-- Añade aquí el nuevo código -->
        <div class="admin-section">
            <h2>Agregar Nuevo Producto</h2>
            <input type="text" id="productName" placeholder="Nombre del Producto">
            <input type="text" id="productDescription" placeholder="Descripción">
            <input type="number" id="productPrice" placeholder="Precio">
            <input type="number" id="productStock" placeholder="Stock">
            <input type="text" id="productImage" placeholder="URL de la imagen">
            <button onclick="createProduct()">Crear Producto</button>
        </div>

        <div class="admin-section" id="products">
            <h2>Inventario Actual</h2>
            <!-- Los productos existentes se cargarán aquí dinámicamente -->
        </div>
    </main>

    <!-- Añade estos scripts solo para admin -->
    <script src="js/admin.js"></script>
    
</body>
</html>
